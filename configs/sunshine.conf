# Sunshine default configuration for containerized gamescope streaming
#
# This file is installed to ~/.config/sunshine/sunshine.conf on first run.
# Modify freely — changes persist in the sunshine-config volume.

# ── Capture ──────────────────────────────────────────────────
# Use gamescope scanout export (zero-overhead, no root needed)
capture = gamescope

# ── Resolution matching ──────────────────────────────────────
# On stream start, set gamescope output to match client resolution.
# On stream stop, no-op (next stream will set it again).
# Uses SUNSHINE_CLIENT_WIDTH/HEIGHT/FPS env vars.
global_prep_cmd = [{"do":"/usr/local/bin/set-resolution.sh","undo":"","elevated":false}]

# ── Network ──────────────────────────────────────────────────
# Allow web UI access from any origin (needed for initial setup)
origin_web_ui_allowed = wan

# Listen on all interfaces
address_family = both

# ── Encoder ──────────────────────────────────────────────────
# Prefer Vulkan Video Encode (AMD hardware encoding)
encoder = vulkan
